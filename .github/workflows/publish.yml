name: Build and Release plugin

on:
  push:
    tags:
      - "v*"  # 버전 태그(v1.2.3) 푸시 시에만 실행

env:
  PLUGIN_NAME: logseq-block-extractor-db

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: |
          npm run build
          mkdir ${{ env.PLUGIN_NAME }}
          cp README.md package.json icon.png CHANGELOG.md ${{ env.PLUGIN_NAME }}
          mv dist ${{ env.PLUGIN_NAME }}
          zip -r ${{ env.PLUGIN_NAME }}-${{ github.ref_name }}.zip ${{ env.PLUGIN_NAME }}

      # 직전 태그 이후의 커밋 메시지를 파싱해 릴리스 노트를 생성한다.
      # -p angular: CHANGELOG.md와 동일한 "사용자용" 노트 (feat/fix/perf/revert만 포함)
      # -p angular를 빼면 CHANGELOG-DEV.md처럼 chore 등 모든 커밋이 포함된 노트가 된다.
      #
      # conventional-changelog v7 CLI 주의사항 (셋 다 없으면 빈 노트가 생성된다):
      # 1. --stdout 플래그가 없으면 stdout이 아니라 CHANGELOG.md 파일에 직접 쓴다
      # 2. infile(-i) 기본값이 CHANGELOG.md라서 기존 changelog 전체가 함께 출력된다
      #    → 빈 파일을 infile로 지정해 새 섹션만 출력되게 한다
      # 3. CI는 태그 푸시 시점에 실행되어 HEAD가 곧 최신 태그이므로
      #    "최신 태그 이후 커밋"이 0개가 된다 → 로컬 태그를 지운 뒤 생성한다 (원격 태그는 그대로)
      - name: Generate release notes
        run: |
          git tag -d ${{ github.ref_name }}
          touch EMPTY_CHANGELOG.md
          npx conventional-changelog -p angular -r 1 -i EMPTY_CHANGELOG.md --stdout > RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.PLUGIN_NAME }}-${{ github.ref_name }}.zip
          body_path: RELEASE_NOTES.md
